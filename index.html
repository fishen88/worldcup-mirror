<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Cup Pool — Leaderboard</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem 3rem;
    background: #fff; color: #1a1a1a;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #111214; color: #e6e6e6; }
    th, td { border-bottom-color: #2a2a2e !important; }
    #stale { background: #4a2f00; color: #ffcf8a; border-color: #7a5200; }
  }
  h1 { font-size: 1.3rem; margin: 0 0 .25rem; }
  #meta { font-size: .85rem; opacity: .7; margin-bottom: 1rem; }
  #stale {
    display: none; background: #fff3cd; color: #7a5200; border: 1px solid #f0c36d;
    border-radius: 6px; padding: .6rem .9rem; font-size: .9rem; margin-bottom: 1rem;
  }
  table { width: 100%; border-collapse: collapse; font-size: .95rem; }
  th, td { text-align: left; padding: .5rem .4rem; border-bottom: 1px solid #e2e2e2; }
  th { font-weight: 600; font-size: .78rem; text-transform: uppercase; opacity: .6; }
  td.num, th.num { text-align: right; }
  #empty, #error { opacity: .7; font-style: italic; }
</style>
</head>
<body>
<h1>World Cup Pool — Leaderboard</h1>
<div id="meta">loading…</div>
<div id="stale">This is a static mirror and it hasn't refreshed in a while — data may be stale.</div>
<table id="board" hidden>
  <thead><tr><th class="num">#</th><th>Player</th><th class="num">Score</th><th>Champion pick</th></tr></thead>
  <tbody id="rows"></tbody>
</table>
<div id="empty" hidden>No standings yet — no picks have been scored.</div>
<div id="error" hidden>Couldn't load data.json.</div>

<script>
(function () {
  var STALE_MS = 30 * 60 * 1000; // 30 min — public-face-plan.md freshness rule

  fetch('./data.json', { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(function () {
      document.getElementById('meta').textContent = '';
      document.getElementById('error').hidden = false;
    });

  function render(data) {
    var lb = data.leaderboard || {};
    var rows = lb.rows || [];
    var metaEl = document.getElementById('meta');
    var staleEl = document.getElementById('stale');

    if (data.generated) {
      var genDate = new Date(data.generated);
      var ageMs = Date.now() - genDate.getTime();
      var stale = !isFinite(ageMs) || ageMs > STALE_MS;
      metaEl.textContent = 'Last updated: ' + genDate.toLocaleString();
      staleEl.style.display = stale ? 'block' : 'none';
    } else {
      metaEl.textContent = '';
      staleEl.style.display = 'block';
    }

    if (!rows.length) {
      document.getElementById('empty').hidden = false;
      return;
    }

    // Champion is already gated server-side (null until the pool locks) — this
    // just displays whatever the API gave us, no privacy logic re-implemented here.
    var tbody = document.getElementById('rows');
    rows.forEach(function (r) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="num">' + esc(r.rank) + '</td>' +
        '<td>' + esc(r.name) + '</td>' +
        '<td class="num">' + esc(r.total) + '</td>' +
        '<td>' + esc(r.champion || '—') + '</td>';
      tbody.appendChild(tr);
    });
    document.getElementById('board').hidden = false;
  }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
})();
</script>
</body>
</html>
